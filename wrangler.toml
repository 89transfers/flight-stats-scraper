name = "flights-data"
main = "src/index.ts"
compatibility_date = "2024-03-11"

# KV Namespace for caching flight data
[[kv_namespaces]]
binding = "FLIGHTS_KV"
id = "f4815bc3b821487da2b09b8a67067e7c"

# Cron trigger to refresh flight data every 3 hours
[triggers]
crons = ["0 */3 * * *"]

[build]
command = "npm run build"
watch_dir = "src"